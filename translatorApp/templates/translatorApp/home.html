{% extends 'base.html' %}

{% block content %}

<style>
body{
  font-family: "Poppins", sans-serif;
  margin: 0;
  text-align: center;
  padding: 40px;
  background-color: aqua;
  

}
.container{
  justify-content: center;
  align-items: center ;
  padding: 30px;
  background: white;
  width: 500px;
  margin: auto;
  border-radius: 10px;
  box-shadow: 0px 0px 10px rgba(red, green, blue, alpha);

}

textarea{
  width: 100%;
  height: 100px;
  margin-top: 10px;
  padding: 10px;
}
select,button{
  margin-top: 10px;
  padding: 10px;
  width: 100%;

}

.result{
margin-top: 20px;
background: #d741ad;
padding: 15px;
border-radius: 8px;

}

  
       
</style>


<div class=" container mt-5">
<h1>TRANSLATOR APP</h1>
<P>WELCOME TO MY TRANSLATOR APP</P>
<form method="POST">
{% csrf_token %}
<textarea name="text" placeholder="PLEASE Enter text to translate">{{text}}</textarea>
<select name="language" id="source lang" >
  {% for lang in languages %}
  <option value="{{lang}}">{{lang}}</option>
  {% endfor %}


</select>

  <button type="submit">Translate</button>
</form>
<div class="result">
<h2>TRANSLATED TEXT</h2>
<P>{{translated_text}}</P>

</div>
 </div>

{% endblock %}
